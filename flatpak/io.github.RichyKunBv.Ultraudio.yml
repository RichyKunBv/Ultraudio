app-id: io.github.RichyKunBv.Ultraudio
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: Ultraudio

finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --share=ipc
  - --socket=pulseaudio
  - --device=dri

sdk-extensions:
  - org.freedesktop.Sdk.Extension.dotnet10

build-options:
  append-path: /usr/lib/sdk/dotnet10/bin
  append-ld-library-path: /usr/lib/sdk/dotnet10/lib
  env:
    DOTNET_ROOT: /usr/lib/sdk/dotnet10

modules:
  - name: ultraudio
    buildsystem: simple
    build-commands:
      - dotnet publish src/Ultraudio.csproj -c Release -p:TargetArch=$FLATPAK_ARCH -p:EnableWindowsTargeting=false -o /app/bin/
      - install -D flatpak/io.github.RichyKunBv.Ultraudio.desktop /app/share/applications/io.github.RichyKunBv.Ultraudio.desktop
      - install -D flatpak/io.github.RichyKunBv.Ultraudio.metainfo.xml /app/share/metainfo/io.github.RichyKunBv.Ultraudio.metainfo.xml
      - install -D src/Assets/icon.png /app/share/icons/hicolor/512x512/apps/io.github.RichyKunBv.Ultraudio.png
    sources:
      - type: git
        url: https://github.com/RichyKunBv/Ultraudio.git
        commit: 34bc13a27ce419e183d045dd353341c817a88a27
      - nuget-sources.json
      - type: file
        url: data:text/xml;charset=utf-8,%3C%3Fxml%20version%3D%221.0%22%20encoding%3D%22utf-8%22%3F%3E%0A%3Cconfiguration%3E%0A%20%20%3CpackageSources%3E%0A%20%20%20%20%3Cclear%20%2F%3E%0A%20%20%20%20%3Cadd%20key%3D%22local%22%20value%3D%22nuget-sources%22%20%2F%3E%0A%20%20%3C%2FpackageSources%3E%0A%3C%2Fconfiguration%3E
        dest-filename: NuGet.Config
