app-id: com.esmesolutions.Ultraudio
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: Ultraudio

finish-args:
  # Graphical
  - --socket=x11
  - --socket=fallback-x11
  - --socket=wayland
  # Audio
  - --socket=pulseaudio
  # D-Bus (for MPRIS2 integration)
  - --own-name=org.mpris.MediaPlayer2.Ultraudio

sdk-extensions:
  - org.freedesktop.Sdk.Extension.dotnet10

build-options:
  append-path: /usr/lib/sdk/dotnet10/bin
  append-ld-library-path: /usr/lib/sdk/dotnet10/lib
  env:
    DOTNET_ROOT: /usr/lib/sdk/dotnet10

modules:
  - name: ultraudio
    buildsystem: simple
    build-commands:
      # Build the application
      # Note: We use -r linux-x64 for now, Flathub will need conditionals for aarch64
      - dotnet publish src/Ultraudio.csproj -c Release -p:TargetArch=x86_64 -o /app/bin/
      
      # Install desktop file
      - install -D flatpak/com.esmesolutions.Ultraudio.desktop /app/share/applications/com.esmesolutions.Ultraudio.desktop
      
      # Install metainfo XML
      - install -D flatpak/com.esmesolutions.Ultraudio.metainfo.xml /app/share/metainfo/com.esmesolutions.Ultraudio.metainfo.xml
      
      # Install icon
      - install -D src/Assets/icon.png /app/share/icons/hicolor/512x512/apps/com.esmesolutions.Ultraudio.png
    sources:
      - type: dir
        path: .
      - flatpak/nuget-sources.json
